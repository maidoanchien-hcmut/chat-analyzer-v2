syntax = "proto3";

package chatanalyzer.conversationanalysis.v1;

message RuntimeSnapshot {
  string profile_id = 1;
  int32 version_no = 2;
  string model_name = 3;
  string prompt_version = 4;
  string output_schema_version = 5;
  string taxonomy_version = 6;
  string page_prompt_text = 7;
  string taxonomy_json = 8;
  string generation_config_json = 9;
  string profile_json = 10;
}

message Message {
  string id = 1;
  string inserted_at = 2;
  string sender_role = 3;
  string sender_name = 4;
  string message_type = 5;
  string redacted_text = 6;
  bool is_meaningful_human_message = 7;
  bool is_opening_block_message = 8;
}

message UnitBundle {
  string thread_day_id = 1;
  string thread_id = 2;
  string connected_page_id = 3;
  string pipeline_run_id = 4;
  string run_group_id = 5;
  string target_date = 6;
  string business_timezone = 7;
  string customer_display_name = 8;
  string normalized_tag_signals_json = 9;
  string observed_tags_json = 10;
  string opening_block_json = 11;
  string first_meaningful_message_id = 12;
  string first_meaningful_message_sender_role = 13;
  string source_thread_json_redacted = 14;
  repeated Message messages = 15;
  string first_meaningful_message_text_redacted = 16;
  string explicit_revisit_signal = 17;
  string explicit_need_signal = 18;
  string explicit_outcome_signal = 19;
  int32 message_count = 20;
  int32 first_staff_response_seconds = 21;
  int32 avg_staff_response_seconds = 22;
  string staff_participants_json = 23;
}

message AnalyzeConversationRequest {
  RuntimeSnapshot runtime = 1;
  repeated UnitBundle bundles = 2;
}

message Usage {
  string json = 1;
}

message AnalysisResult {
  string thread_day_id = 1;
  string result_status = 2;
  string prompt_hash = 3;
  string opening_theme_code = 4;
  string opening_theme_reason = 5;
  string customer_mood_code = 6;
  string primary_need_code = 7;
  string primary_topic_code = 8;
  string journey_code = 9;
  string closing_outcome_inference_code = 10;
  string process_risk_level_code = 11;
  string process_risk_reason_text = 12;
  string staff_assessments_json = 13;
  string evidence_used_json = 14;
  string field_explanations_json = 15;
  string supporting_message_ids_json = 16;
  Usage usage = 17;
  int64 cost_micros = 18;
  string failure_info_json = 19;
}

message AnalyzeConversationResponse {
  repeated AnalysisResult results = 1;
  string runtime_metadata_json = 2;
}

service ConversationAnalysisService {
  rpc AnalyzeConversation(AnalyzeConversationRequest) returns (AnalyzeConversationResponse);
}
